version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dockerfile
    container_name: robotics-safety-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - backend_logs:/app/logs
    networks:
      - safety-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend Next.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: FDockerfile.dockerfile
    container_name: robotics-safety-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - safety-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: robotics-safety-db
    environment:
      POSTGRES_DB: safety_monitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema:/docker-entrypoint-initdb.d
    networks:
      - safety-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d safety_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: robotics-safety-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - safety-network
    restart: unless-stopped

  # Nginx for reverse proxy (production)
  nginx:
    image: nginx:alpine
    container_name: robotics-safety-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - safety-network
    restart: unless-stopped
    profiles:
      - production

networks:
  safety-network:
    driver: bridge
    name: safety-network

volumes:
  backend_data:
    driver: local
  backend_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
